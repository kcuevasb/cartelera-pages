<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cartelera se ha mudado</title>
  <meta http-equiv="refresh" content="0; url=https://cartelera-app.onrender.com">
  <link rel="canonical" href="https://cartelera-app.onrender.com">
  <style>
    body { font: 16px/1.5 system-ui, sans-serif; max-width: 32rem; margin: 4rem auto; padding: 0 1.5rem; color: #222; }
    a { color: #2563eb; }
  </style>
</head>
<body>
  <h1>Cartelera se ha mudado</h1>
  <p>Esta versión (sin cuenta, guardada solo en este navegador) ya no se mantiene.
     Cartelera ahora vive en <a href="https://cartelera-app.onrender.com">cartelera-app.onrender.com</a>,
     con cuenta de Google y tu biblioteca sincronizada entre dispositivos.</p>
  <p>Si no te redirige solo, <a href="https://cartelera-app.onrender.com">entra aquí</a>.</p>
  <script>
    // Limpia cualquier Service Worker/caché de la PWA vieja instalada en este
    // navegador antes de redirigir, para que no se quede sirviendo la app
    // antigua desde caché en próximas visitas (p.ej. accesos añadidos a la
    // pantalla de inicio del móvil).
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
    }
    if ('caches' in window) {
      caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
    }
    location.replace('https://cartelera-app.onrender.com');
  </script>
</body>
</html>
