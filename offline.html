<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartelera — sin conexión</title>
<style>
  html,body{margin:0;padding:0;background:#121212;color:#e4e4e1;font-family:Inter,sans-serif;height:100%;}
  .wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:24px;box-sizing:border-box;}
  h1{font-family:Georgia,serif;color:#e3a73b;font-size:28px;margin:0 0 8px;}
  p{color:#8c8c88;max-width:360px;line-height:1.5;}
  button{margin-top:20px;background:none;border:1px solid rgba(255,255,255,.15);color:#e4e4e1;padding:10px 18px;border-radius:6px;font-size:14px;cursor:pointer;}
  button:hover{border-color:#e3a73b;color:#e3a73b;}
</style>
</head>
<body>
  <div class="wrap">
    <h1>Sin conexión</h1>
    <p>No se pudo conectar con Cartelera y esta página tampoco se había guardado antes para verla sin conexión. Comprueba tu conexión a internet e inténtalo de nuevo.</p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
</body>
</html>
